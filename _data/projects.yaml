- title: RegVelo
  subtitle: Gene-regulatory-informed dynamics of single cells
  group: featured
  image: images/projects/regvelo-cover.png
  link: /projects/regvelo/
  description: RegVelo connects single-cell dynamics with gene regulatory networks to predict how cells choose their future states and which genes drive those transitions. By simulating regulatory perturbations, it helps prioritize experimentally testable drivers of cell fate.
  repo: theislab/regvelo
  tags:
    - software
    - method
    - single-cell
    - GRN

- title: Neural crest regulatory circuits
  subtitle: Single-cell multi-omics, spatial transcriptomics and systematic perturbation
  group: featured
  image: images/projects/neural-crest-cover.png
  link: /projects/neural-crest/
  description: By integrating time-resolved single-cell multi-omics, spatial transcriptomics, and systematic Perturb-seq, this work maps the regulatory programs that guide cranial neural crest migration and fate decisions. It reveals how regulatory circuits control cell plasticity during development.
  repo: zhiyhu/neural-crest-scmultiomics
  tags:
    - preprint
    - resource
    - development
    - multiomics

- title: TEMPT
  subtitle: Whole-genome EV-DNA methylation profiling
  group: featured
  image: images/projects/tempt-cover.png
  link: /projects/tempt/
  description: TEMPT enables whole-genome methylation profiling of extracellular vesicle DNA from low-input samples. The method supports liquid biopsy studies by revealing cancer-associated methylation patterns and intercellular communication features.
  repo: zhiyuan-hu-lab/TEMPT-paper
  tags:
    - method
    - epigenomics
    - liquid-biopsy
    - publication

- title: FINE-EM-seq
  subtitle: Rapid isothermal methylome profiling for early embryos
  image: images/projects/fine-em-seq-cover.png
  link: /projects/fine-em-seq/
  description: FINE-EM-seq is a rapid isothermal amplification strategy for low-input methylome profiling. It enables high-coverage methylation analysis of early embryos and helps resolve methylome dynamics during development.
  repo: zhiyuan-hu-lab/FINE-EM-seq
  tags:
    - method
    - epigenomics
    - zebrafish
    - publication

- title: CIDER
  subtitle: Interpretable meta-clustering for scRNA-seq integration and evaluation
  image: images/projects/cider-cover.png
  link: /projects/cider/
  description: CIDER is an interpretable meta-clustering framework for single-cell RNA-seq data integration and evaluation. It helps identify consistent cell populations across complex datasets while assessing whether integration preserves meaningful biological structure.
  repo: zhiyuan-hu-lab/CIDER
  tags:
    - software
    - single-cell
    - integration
    - resource
