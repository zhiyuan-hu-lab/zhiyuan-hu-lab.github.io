# site properties and page defaults
title: 胡致远课题组 | Hu Lab
subtitle: Single-cell & Spatial Omics · Regulatory Genomics · Development & Disease
description: 胡致远课题组依托武汉大学医学研究院/免疫与代谢前沿科学中心，聚焦单细胞与空间多组学、基因调控网络，以及发育与疾病相关机制研究。
header: images/home/hero-multiome.jpg
footer: images/home/footer-grid.png
proofer: false

